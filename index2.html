<html lang="es" class="h-full">

  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    * { font-family: 'Nunito', sans-serif; }
    .title-font { font-family: 'Fredoka One', cursive; }

    .color-btn {
      width: 52px; height: 52px; border-radius: 50%; cursor: pointer;
      border: 4px solid rgba(255,255,255,0.7);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active {
      transform: scale(1.2);
      box-shadow: 0 0 0 4px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.5);
      border-color: #fff;
    }
    .color-btn.active::after {
      content: '✓'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 900; font-size: 20px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .tower-part {
      cursor: pointer;
      transition: filter 0.15s, transform 0.15s;
      stroke: #333; stroke-width: 2;
    }
    .tower-part:hover {
      filter: brightness(1.12);
      transform-origin: center;
    }

    .sparkle {
      position: absolute; pointer-events: none;
      animation: sparkleAnim 0.6s ease-out forwards;
    }
    @keyframes sparkleAnim {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
    }

    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }
    .bounce-in { animation: bounceIn 0.5s ease-out; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .float-anim { animation: float 3s ease-in-out infinite; }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .rainbow-bg {
      background: linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B);
      background-size: 200% 100%;
      animation: rainbow 4s linear infinite;
    }

    .eraser-pattern {
      background: repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%) 50% / 12px 12px;
    }

    .reset-btn {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .reset-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .confetti {
      position: fixed; pointer-events: none; z-index: 100;
      animation: confettiFall 1.5s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(300px) rotate(720deg) scale(0); opacity: 0; }
    }

    .tab-content { display: none !important; }
    .tab-content.active { display: flex !important; }

    .nav-tab.active {
      background: rgba(255,255,255,0.4) !important;
      border-color: white !important;
      box-shadow: 0 0 20px rgba(255,255,255,0.5);
      transform: scale(1.05);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>

  <script>
    // --- State ---
    let selectedColor = '#FF6B6B';
    const defaultFills = {};
    const currentFills = {};
    let currentTab = 'tower';

    // Store default fills for all parts
    document.querySelectorAll('.tower-part').forEach(part => {
      defaultFills[part.id] = part.getAttribute('fill');
      currentFills[part.id] = part.getAttribute('fill');
    });

    // --- Tab Navigation ---
    document.querySelectorAll('.nav-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        currentTab = tabName;

        // Update active tab button
        document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update active tab content
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(tabName + '-tab').classList.add('active');
      });
    });

    // --- Color Selection ---
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedColor = btn.dataset.color;
      });
    });

    // --- Paint Tower Parts ---
    document.querySelectorAll('.tower-part').forEach(part => {
      part.addEventListener('click', (e) => {
        const newColor = selectedColor === 'eraser' ? defaultFills[part.id] : selectedColor;
        part.setAttribute('fill', newColor);
        currentFills[part.id] = newColor;
        spawnSparkle(e.clientX, e.clientY);
        spawnConfetti(e.clientX, e.clientY, newColor === defaultFills[part.id] ? '#ccc' : newColor);
      });
    });

    // --- Sparkle Effect ---
    function spawnSparkle(x, y) {
      const el = document.createElement('div');
      el.className = 'sparkle';
      el.style.left = (x - 15) + 'px';
      el.style.top = (y - 15) + 'px';
      el.style.width = '30px';
      el.style.height = '30px';
      el.innerHTML = ['✨','⭐','🌟','💫'][Math.floor(Math.random()*4)];
      el.style.fontSize = '24px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }

    // --- Confetti ---
    function spawnConfetti(x, y, color) {
      for (let i = 0; i < 6; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = (x + (Math.random()-0.5)*40) + 'px';
        c.style.top = (y - 10) + 'px';
        c.style.width = '8px';
        c.style.height = '8px';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.style.background = color;
        c.style.animationDuration = (0.8 + Math.random()*0.8) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 1600);
      }
    }

    // --- Reset ---
    document.getElementById('reset-btn').addEventListener('click', () => {
      document.querySelectorAll('.tower-part').forEach(part => {
        part.setAttribute('fill', defaultFills[part.id]);
        currentFills[part.id] = defaultFills[part.id];
      });
      // Big celebration reset
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#9B59B6','#FF69B4'];
          spawnConfetti(
            Math.random() * window.innerWidth,
            Math.random() * 100,
            colors[Math.floor(Math.random()*colors.length)]
          );
        }, i * 50);
      }
    });

    // --- Element SDK ---
    const defaultConfig = {
      game_title: '🖥️ ¡Colorea Tu PC! 🎨',
      instruction_text: '¡Elige un color y toca las partes!',
      background_color: '#667eea',
      surface_color: '#ffffff',
      text_color: '#ffffff',
      primary_action_color: '#FF6B6B',
      font_family: 'Fredoka One',
      font_size: 16
    };

    function applyConfig(config) {
      const title = config.game_title || defaultConfig.game_title;
      const instruction = config.instruction_text || defaultConfig.instruction_text;
      const bg = config.background_color || defaultConfig.background_color;
      const textColor = config.text_color || defaultConfig.text_color;
      const font = config.font_family || defaultConfig.font_family;
      const fontSize = config.font_size || defaultConfig.font_size;

      const titleEl = document.getElementById('game-title');
      const instrEl = document.getElementById('instruction-text');
      const wrapper = document.getElementById('app-wrapper');
      const resetBtn = document.getElementById('reset-btn');

      if (titleEl) {
        titleEl.textContent = title;
        titleEl.style.color = textColor;
        titleEl.style.fontFamily = `${font}, Fredoka One, cursive`;
        titleEl.style.fontSize = `${fontSize * 2.2}px`;
      }
      if (instrEl) {
        instrEl.textContent = instruction;
        instrEl.style.color = textColor;
        instrEl.style.fontFamily = `${font}, Nunito, sans-serif`;
        instrEl.style.fontSize = `${fontSize}px`;
      }
      if (wrapper) {
        wrapper.style.background = `linear-gradient(135deg, ${bg} 0%, #764ba2 50%, #f093fb 100%)`;
      }
      if (resetBtn) {
        resetBtn.style.fontFamily = `${font}, Fredoka One, cursive`;
        resetBtn.style.fontSize = `${fontSize * 1.1}px`;
      }
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => { applyConfig(config); },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
            },
            {
              get: () => config.surface_color || defaultConfig.surface_color,
              set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
            },
            {
              get: () => config.primary_action_color || defaultConfig.primary_action_color,
              set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ['game_title', config.game_title || defaultConfig.game_title],
          ['instruction_text', config.instruction_text || defaultConfig.instruction_text]
        ])
      });
    }

    applyConfig(defaultConfig);
    lucide.createIcons();
  </script>
